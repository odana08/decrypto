name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: decrypto
          POSTGRES_PASSWORD: decrypto
          POSTGRES_DB: decrypto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decrypto -d decrypto_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://decrypto:decrypto@localhost:5432/decrypto_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile backend
        run: python -m compileall backend/src backend/scripts

      - name: Verify Postgres schema
        run: python backend/scripts/init_database.py

      - name: Verify Redis connectivity
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -c "from redis import Redis; client = Redis.from_url('$REDIS_URL'); assert client.ping()"

      - name: Run backend tests
        run: PYTHONPATH=backend pytest backend/tests

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  model-quality:
    name: Model Quality Gate
    runs-on: ubuntu-latest

    env:
      MODEL_MIN_ILLICIT_F1: "0.75"
      MODEL_MIN_ILLICIT_RECALL: "0.70"
      MODEL_MIN_ROC_AUC: "0.80"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install model dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore private model assets
        env:
          MODEL_DATA_ARCHIVE_URL: ${{ secrets.MODEL_DATA_ARCHIVE_URL }}
          MODEL_ARTIFACT_ARCHIVE_URL: ${{ secrets.MODEL_ARTIFACT_ARCHIVE_URL }}
        run: |
          if [ -n "$MODEL_DATA_ARCHIVE_URL" ]; then
            curl -fsSL "$MODEL_DATA_ARCHIVE_URL" -o /tmp/model-data.zip
            unzip -o /tmp/model-data.zip -d backend/data
          fi
          if [ -n "$MODEL_ARTIFACT_ARCHIVE_URL" ]; then
            curl -fsSL "$MODEL_ARTIFACT_ARCHIVE_URL" -o /tmp/model-artifacts.zip
            unzip -o /tmp/model-artifacts.zip -d backend/models
          fi

      - name: Evaluate saved classifier
        run: python backend/scripts/evaluate_model.py
